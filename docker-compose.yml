version: '3.8'

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: pricetracker
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pricetracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pricetracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://pricetracker:password@db:5432/pricetracker
      SECRET_KEY: your_secret_key_here
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  agent:
    build: ./agent
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-your_key_here}
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  caddy_data:
